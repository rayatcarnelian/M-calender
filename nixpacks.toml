# Build-time environment variables
[variables]
YOUTUBE_DL_SKIP_PYTHON_CHECK = "1"

# Setup phase: install Node 20, Python3, and ffmpeg via Nix
[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x", "python3", "ffmpeg"]

# Install phase: run npm ci with the env var
[phases.install]
cmds = ["npm ci"]

# Build phase: generate Prisma client and build Next.js
[phases.build]
cmds = ["npx prisma generate", "npm run build"]

# Start command
[start]
cmd = "npx prisma db push --accept-data-loss && node .next/standalone/server.js"
