[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["...", "ffmpeg"]

[deploy]
startCommand = "npx prisma migrate deploy 2>/dev/null; npx prisma db push --accept-data-loss && node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
