[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["...", "ffmpeg", "python3"]
nodeVersion = "20"

[build.nixpacksPlan.phases.install]
cmds = ["YOUTUBE_DL_SKIP_PYTHON_CHECK=1 npm ci"]

[deploy]
startCommand = "npx prisma db push --accept-data-loss && node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
